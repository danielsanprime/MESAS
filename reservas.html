<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reserva - DANIEL SAN PRIME</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Poppins',sans-serif;background:#fff;display:flex;justify-content:center;padding:20px}
.container{width:100%;max-width:420px;background:#fff;padding:25px;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,.08)}
.logo{text-align:center;margin-bottom:15px}
.logo img{width:110px}
h2{text-align:center;margin-bottom:20px;font-weight:600}
.field{position:relative;margin-bottom:12px}
.field input,.field select{width:100%;padding:16px 14px 10px;border-radius:14px;border:1.5px solid #ddd;background:#fafafa;font-size:14px;outline:none}
.field label{position:absolute;top:50%;left:14px;transform:translateY(-50%);font-size:13px;color:#888;pointer-events:none;transition:.2s;background:#fff;padding:0 4px}
.field input:focus+label,.field input:not(:placeholder-shown)+label,.field select:focus+label,.field select:valid+label{top:6px;font-size:11px;color:#000}
.row{display:flex;gap:10px}
.row .field{flex:1}
.info{background:#f2f2f2;padding:12px;border-radius:12px;font-size:13px;color:#555;margin-bottom:12px;line-height:1.5}
button{width:100%;padding:16px;border-radius:16px;border:none;background:#000;color:#fff;font-weight:600;font-size:16px;cursor:pointer}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:#000;color:#fff;padding:14px 20px;border-radius:12px;opacity:0;transition:.3s}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>

<body>

<div class="container">
  <div class="logo"><img src="logo.png"></div>
  <h2>Reserva de Mesa</h2>

  <div class="row">
    <div class="field">
      <input id="nome" type="text" placeholder=" " required>
      <label>Nome</label>
    </div>
    <div class="field">
      <input id="sobrenome" type="text" placeholder=" " required>
      <label>Sobrenome</label>
    </div>
  </div>

  <div class="field">
    <input type="date" id="data" placeholder=" " required>
    <label>Data</label>
  </div>

  <div class="field">
    <select id="hora" required>
      <option value=""></option>
      <option>11:00</option><option>11:30</option><option>12:00</option><option>12:30</option>
      <option>18:00</option><option>18:30</option><option>19:00</option><option>19:30</option><option>20:00</option>
    </select>
    <label>Horário</label>
  </div>

  <div class="field">
    <select id="ambiente" required>
      <option value=""></option>
      <option>Interna</option>
      <option>Externa</option>
    </select>
    <label>Área</label>
  </div>

  <div class="field">
    <select id="pessoas" required>
      <option value=""></option><option>1 pessoas</option>
<option>2 pessoas</option>
<option>3 pessoas</option>
<option>4 pessoas</option>
<option>5 pessoas</option>
<option>6 pessoas</option>
<option>7 pessoas</option>
<option>8 pessoas</option>
<option>9 pessoas</option>
<option>10 pessoas</option>
<option>11 pessoas</option>
<option>12 pessoas</option>
<option>13 pessoas</option>
<option>14 pessoas</option>
<option>15 pessoas</option>
<option>16 pessoas</option>
<option>17 pessoas</option>
<option>18 pessoas</option>
<option>19 pessoas</option>
<option>20 pessoas</option>
<option>21 pessoas</option>
<option>22 pessoas</option>
<option>23 pessoas</option>
<option>24 pessoas</option>
<option>25 pessoas</option>
<option>26 pessoas</option>
<option>27 pessoas</option>
<option>28 pessoas</option>
<option>29 pessoas</option>
<option>30 pessoas</option>
<option>31 pessoas</option>
<option>32 pessoas</option>
<option>33 pessoas</option>
<option>34 pessoas</option>
<option>35 pessoas</option>
<option>36 pessoas</option>
<option>37 pessoas</option>
<option>38 pessoas</option>
<option>39 pessoas</option>
<option>40 pessoas</option>
</select>
    <label>Quantidade de pessoas</label>
  </div>

  <div class="field">
    <input id="telefone" type="tel" placeholder=" " required>
    <label>Telefone</label>
  </div>

  <div class="field">
    <input id="email" type="email" placeholder=" " required>
    <label>E-mail</label>
  </div>

  <div class="info">
    <strong>Horários de Atendimento</strong><br>
    Seg a Sab<br>
    Almoço: 11h às 14:40<br>
    Jantar: 18h às 23:00
  </div>

  <button onclick="reservar()">Reservar Mesa</button>
</div>

<div id="toast" class="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCDRuVrWEjsXY4FNlFNqEGln3XDqNYlUpo",
  authDomain: "daniel-san-pedidos.firebaseapp.com",
  projectId: "daniel-san-pedidos"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.reservar = async function() {
  const nome = document.getElementById("nome").value;
  const data = document.getElementById("data").value;
  const hora = document.getElementById("hora").value;

  if(!nome || !data || !hora){
    showToast("Preencha os campos obrigatórios");
    return;
  }

  const partes = data.split("-");
  const d = new Date(partes[0], partes[1]-1, partes[2]);
  if(d.getDay() === 0){
    showToast("Hoje estamos fechados");
    return;
  }

  const q = query(collection(db,"reservas"),
    where("data","==",data),
    where("hora","==",hora)
  );

  const snap = await getDocs(q);

  if(snap.size >= 10){
    showToast("Horário lotado");
    return;
  }

  await addDoc(collection(db,"reservas"),{
    nome,
    data,
    hora,
    criadoEm: new Date().toISOString()
  });

  showToast("Reserva confirmada!");
}

function showToast(msg){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),3000);
}
</script>

</body>
</html>
