let q=pedido[nome]||0;
return `<div class="item">
<div><b>${nome}</b><div class="desc">${desc}</div></div>
<div class="controls">
<button onclick="alt('${nome}',-1)">-</button>
<div class="qty" id="q_${nome}">${q}</div>
<button onclick="alt('${nome}',1)">+</button>
</div></div>`
}
function alt(nome,v){
pedido[nome]=(pedido[nome]||0)+v;
if(pedido[nome]<0)pedido[nome]=0;
document.getElementById('q_'+nome).innerText=pedido[nome];
}

<script>
function slug(text){
return text
.toLowerCase()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g,"")
.replace(/[^a-z0-9]+/g,"-")
.replace(/(^-|-$)/g,"")
}

document.querySelectorAll(".item").forEach(item=>{
let nameEl = item.querySelector("b");
if(!nameEl) return;

let name = nameEl.innerText.trim();
let file = slug(name);

let img = document.createElement("img");
img.src = "fotos/"+file+".jpg";

img.onerror = function(){
this.onerror=null;
this.src="fotos/"+file+".png";
};

// remove existing thumb/placeholder
let old = item.querySelector("img");
if(old) old.remove();

item.insertBefore(img, item.firstChild);
});
</script>

<script>
let cart = [];
let currentItem = "";
let quantity = 1;

document.addEventListener('click', function(e){
  const item = e.target.closest('.item');
  if(item && !e.target.closest('#modal')){
    currentItem = (item.querySelector('b')?.innerText || 'Item');
    quantity = 1;
    document.getElementById('mqty').innerText = quantity;
    document.getElementById('mname').innerText = currentItem;
    document.getElementById('modal').style.display = 'flex';
  }
});

document.getElementById('menos').addEventListener('click', function(e){
  e.stopPropagation();
  quantity = Math.max(1, quantity - 1);
  document.getElementById('mqty').innerText = quantity;
});

document.getElementById('mais').addEventListener('click', function(e){
  e.stopPropagation();
  quantity++;
  document.getElementById('mqty').innerText = quantity;
});

document.getElementById('addBtn').addEventListener('click', function(){
  cart.push({name: currentItem, qty: quantity});
  updateCart();
  document.getElementById('modal').style.display = 'none';
});

document.getElementById('sendBtn').addEventListener('click', function(){
  if(cart.length === 0){
    alert('Nenhum item selecionado');
    return;
  }
  alert('Pedido enviado para produção:\n' + cart.map(i => i.qty + 'x ' + i.name).join('\n'));
  cart = [];
  updateCart();
});

function updateCart(){
  let total = 0;
  cart.forEach(i => total += i.qty);
  document.getElementById('count').innerText = total;
}

document.getElementById('modal').addEventListener('click', function(e){
  if(e.target.id === 'modal'){
    document.getElementById('modal').style.display = 'none';
  }
});
</script>

<script>
function abrirPedido(){
  if(!window.cart){return}
  const lista=document.getElementById('pedidoLista');
  lista.innerHTML='';
  window.cart.forEach((i,idx)=>{
    const div=document.createElement('div');
    div.style.display='flex';
    div.style.justifyContent='space-between';
    div.style.margin='8px 0';
    div.innerHTML='<span>'+i.qty+'x '+i.name+'</span><button onclick="removerItem('+idx+')">Excluir</button>';
    lista.appendChild(div);
  });
  document.getElementById('pedidoPanel').style.display='flex';
}
function fecharPedido(){document.getElementById('pedidoPanel').style.display='none'}
function removerItem(i){
  window.cart.splice(i,1);
  if(window.updateCart) updateCart();
  abrirPedido();
}
document.getElementById('count')?.parentElement?.addEventListener('click',abrirPedido);
</script>


<script>
function collectItems(){
  const list=document.getElementById('confirmList');
  list.innerHTML='';
  const candidates=document.querySelectorAll('#bar li, .cart li, .pedido li, .order li, .list li');
  if(candidates.length===0){ list.innerHTML='<em>Seu pedido está vazio</em>'; return; }
  candidates.forEach((el)=>{
    const txt=el.innerText.trim();
    if(!txt) return;
    const row=document.createElement('div');
    row.style.display='flex';
    row.style.justifyContent='space-between';
    row.style.margin='8px 0';
    const span=document.createElement('span');
    span.textContent=txt;
    const del=document.createElement('button');
    del.textContent='Excluir';
    del.onclick=()=>{ el.remove(); row.remove(); };
    row.appendChild(span); row.appendChild(del);
    list.appendChild(row);
  });
}
document.getElementById('floatSend').onclick=()=>{
  collectItems();
  document.getElementById('confirmPanel').style.display='flex';
};
document.getElementById('confirmSend').onclick=()=>{
  const original=document.querySelector('button.send, #sendBtn, .sendKitchen');
  if(original) original.click();
  document.getElementById('confirmPanel').style.display='none';
  alert('Pedido enviado à cozinha');
};
</script>


<script>
const myCart = [];

function updateFloatCount(){
  let total = myCart.reduce((a,b)=>a+b.qty,0);
  let btn=document.getElementById('floatSend');
  if(btn) btn.innerText = 'Enviar à cozinha ('+total+')';
}

function captureFromModal(){
  const modal=document.querySelector('.modal, .popup, .dialog');
  if(!modal) return null;
  const nameEl=modal.querySelector('h3, .title, .name');
  const qtyEl=modal.querySelector('#qv, #mqty, .qty, .quantity');
  if(!nameEl || !qtyEl) return null;
  let name=nameEl.innerText.trim();
  let qty=parseInt(qtyEl.innerText)||1;
  return {name,qty};
}

document.addEventListener('click',function(e){
  const t=e.target;
  if(!t) return;
  const txt=(t.innerText||'').toLowerCase();

  if(/adicionar|ok|confirmar/.test(txt)){
    const item=captureFromModal();
    if(item){
      const found=myCart.find(i=>i.name===item.name);
      if(found) found.qty+=item.qty;
      else myCart.push(item);
      updateFloatCount();
    }
  }
});

// rebuild confirm list
function collectItems(){
  const list=document.getElementById('confirmList');
  list.innerHTML='';
  if(myCart.length===0){ list.innerHTML='<em>Seu pedido está vazio</em>'; return;}
  myCart.forEach((it,idx)=>{
    const row=document.createElement('div');
    row.style.display='flex';
    row.style.justifyContent='space-between';
    row.style.margin='8px 0';
    const span=document.createElement('span');
    span.textContent=it.qty+'x '+it.name;
    const del=document.createElement('button');
    del.textContent='Excluir';
    del.onclick=()=>{ myCart.splice(idx,1); collectItems(); updateFloatCount(); };
    row.appendChild(span); row.appendChild(del);
    list.appendChild(row);
  });
}

document.getElementById('floatSend').onclick=()=>{
  collectItems();
  document.getElementById('confirmPanel').style.display='flex';
};

document.getElementById('confirmSend').onclick=()=>{
  myCart.length=0;
  updateFloatCount();
  document.getElementById('confirmPanel').style.display='none';
  alert('Pedido enviado à cozinha');
};
</script>


<script>
let currentItemName=null;

document.addEventListener('click',function(e){
  const card=e.target.closest('.item, .card, .produto');
  if(card){
    const t=card.querySelector('b, .title, h3, h4');
    if(t) currentItemName=t.innerText.trim();
  }
});

function readQty(){
  const q=document.querySelector('#qv, #mqty, .qty, .quantity');
  if(!q) return 1;
  const n=parseInt(q.innerText);
  return isNaN(n)?1:n;
}

function addCaptured(){
  if(!currentItemName) return;
  const qty=readQty();
  const found=myCart.find(i=>i.name===currentItemName);
  if(found) found.qty+=qty;
  else myCart.push({name:currentItemName,qty:qty});
  updateFloatCount();
  currentItemName=null;
}

document.addEventListener('click',function(e){
  const txt=(e.target.innerText||'').toLowerCase();
  if(/ok|confirmar|adicionar|fechar|✓/.test(txt)){
    setTimeout(addCaptured,200);
  }
});
</script>


<script>
let dsCart=[];let dsItem="";let dsQty=1;

document.addEventListener('click',function(e){
 const el=e.target.closest('.item, .card, .produto');
 if(!el) return;
 e.stopImmediatePropagation(); e.preventDefault();
 dsItem=(el.innerText||'').trim().split('\n')[0];
 dsQty=1;document.getElementById('ds_num').innerText=1;
 document.getElementById('ds_title').innerText=dsItem;
 document.getElementById('ds_modal').style.display='flex';
},true);

function dsChange(v){dsQty=Math.max(1,dsQty+v);document.getElementById('ds_num').innerText=dsQty;}
function dsAdd(){
 const f=dsCart.find(i=>i.name===dsItem);
 if(f)f.qty+=dsQty;else dsCart.push({name:dsItem,qty:dsQty});
 dsUpdate();document.getElementById('ds_modal').style.display='none';
}
function dsUpdate(){
 const t=dsCart.reduce((a,b)=>a+b.qty,0);
 const b=document.getElementById('ds_float');
 b.style.display=t?'block':'none';b.innerText='Seu pedido ('+t+')';
}
document.getElementById('ds_float').onclick=function(){
 const l=document.getElementById('ds_list');l.innerHTML='';
 dsCart.forEach((it,i)=>{
  const r=document.createElement('div');r.className='ds_row';
  r.innerHTML='<span><b>'+it.qty+'x</b> '+it.name+'</span>';
  const d=document.createElement('button');d.className='ds_del';d.innerText='Excluir';
  d.onclick=()=>{dsCart.splice(i,1);dsUpdate();this.click();};
  r.appendChild(d);l.appendChild(r);
 });
 document.getElementById('ds_review').style.display='flex';
};

function dsSend(){
const params=new URLSearchParams(window.location.search);
const mesa=params.get("mesa")||"Balcao";

let texto="DANIEL SAN PRIME\n";
texto+="Mesa: "+mesa+"\n----------------\n";

dsCart.forEach(i=>{
texto+=i.q+"x "+i.name+"\n";
});

fetch("http://192.168.15.119:9100",{method:"POST",body:texto});

dsCart=[];
dsUpdate();
document.getElementById('ds_review').style.display='none';
alert('Pedido enviado para cozinha');
}

document.getElementById('ds_modal').onclick=e=>{if(e.target.id==='ds_modal')e.target.style.display='none'}
document.getElementById('ds_review').onclick=e=>{if(e.target.id==='ds_review')e.target.style.display='none'}
</script>
