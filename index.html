<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reserva - DANIEL SAN PRIME</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Poppins',sans-serif;background:#fff;display:flex;justify-content:center;padding:20px}
.container{width:100%;max-width:420px;background:#fff;padding:25px;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,.08)}
.logo{text-align:center;margin-bottom:15px}
.logo img{width:110px}
h2{text-align:center;margin-bottom:20px}
.field{position:relative;margin-bottom:12px}
.field input,.field select,.field textarea{
width:100%;padding:16px 14px 10px;border-radius:14px;border:1.5px solid #ddd;background:#fafafa;font-size:14px;outline:none
}
.field textarea{resize:none;height:90px}
.field label{
position:absolute;top:50%;left:14px;transform:translateY(-50%);
font-size:13px;color:#888;background:#fff;padding:0 4px;transition:.2s
}
.field input:focus+label,
.field input:not(:placeholder-shown)+label,
.field select:focus+label,
.field select:valid+label,
.field textarea:focus+label,
.field textarea:not(:placeholder-shown)+label{
top:6px;font-size:11px;color:#000
}
.row{display:flex;gap:10px}
.row .field{flex:1}

.info{
background:#f2f2f2;padding:12px;border-radius:12px;font-size:13px;color:#555;margin-bottom:12px
}

button{
width:100%;padding:16px;border-radius:16px;border:none;
background:#000;color:#fff;font-weight:600;font-size:16px;cursor:pointer;
}

.toast{
position:fixed;bottom:30px;left:50%;
transform:translateX(-50%) translateY(20px);
background:#000;color:#fff;padding:14px 20px;
border-radius:12px;opacity:0;transition:.3s
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>

<body>

<div class="container">
<div class="logo"><img src="logo.png"></div>
<h2>Reserva de Mesa</h2>

<div class="row">
<div class="field">
<input id="nome" placeholder=" " required>
<label>Nome</label>
</div>
<div class="field">
<input id="sobrenome" placeholder=" " required>
<label>Sobrenome</label>
</div>
</div>

<div class="field">
<input id="data" type="date" placeholder=" " required>
<label>Data</label>
</div>

<div class="field">
<select id="hora" required>
<option value=""></option>
<option>11:00</option><option>11:30</option><option>12:00</option><option>12:30</option>
<option>18:00</option><option>18:30</option><option>19:00</option><option>19:30</option><option>20:00</option>
</select>
<label>Horário</label>
</div>

<div class="field">
<select id="ambiente" required>
<option value=""></option>
<option>Interna</option>
<option>Externa</option>
</select>
<label>Área</label>
</div>

<div class="field">
<select id="pessoas" required>
<option value=""></option>
<option>1 pessoas</option>
<option>2 pessoas</option>
<option>3 pessoas</option>
<option>4 pessoas</option>
<option>5 pessoas</option>
<option>6 pessoas</option>
<option>7 pessoas</option>
<option>8 pessoas</option>
<option>9 pessoas</option>
<option>10 pessoas</option>
<option>11 pessoas</option>
<option>12 pessoas</option>
<option>13 pessoas</option>
<option>14 pessoas</option>
<option>15 pessoas</option>
<option>16 pessoas</option>
<option>17 pessoas</option>
<option>18 pessoas</option>
<option>19 pessoas</option>
<option>20 pessoas</option>
<option>21 pessoas</option>
<option>22 pessoas</option>
<option>23 pessoas</option>
<option>24 pessoas</option>
<option>25 pessoas</option>
<option>26 pessoas</option>
<option>27 pessoas</option>
<option>28 pessoas</option>
<option>29 pessoas</option>
<option>30 pessoas</option>
<option>31 pessoas</option>
<option>32 pessoas</option>
<option>33 pessoas</option>
<option>34 pessoas</option>
<option>35 pessoas</option>
<option>36 pessoas</option>
<option>37 pessoas</option>
<option>38 pessoas</option>
<option>39 pessoas</option>
<option>40 pessoas</option>
</select>
<label>Quantidade de pessoas</label>
</div>

<div class="field">
<input id="telefone" placeholder=" " required>
<label>Telefone</label>
</div>

<div class="field">
<textarea id="obs" placeholder=" "></textarea>
<label>Observações</label>
</div>

<div class="info">
<strong>Horários de Atendimento</strong><br>
Seg a Sab<br>
Almoço: 11h às 14:40<br>
Jantar: 18h às 23:00
</div>

<button onclick="reservar()">Reservar Mesa</button>
</div>

<div id="toast" class="toast"></div>

<script>
function reservar(){

const nome=document.getElementById("nome").value;
const sobrenome=document.getElementById("sobrenome").value;
const data=document.getElementById("data").value;
const hora=document.getElementById("hora").value;
const ambiente=document.getElementById("ambiente").value;
const pessoas=document.getElementById("pessoas").value;
const telefone=document.getElementById("telefone").value;
const obs=document.getElementById("obs").value;

if(!nome||!sobrenome||!data||!hora||!ambiente||!pessoas||!telefone){
showToast("Preencha todos os campos obrigatórios");
return;
}

const partes=data.split("-");
const d=new Date(partes[0],partes[1]-1,partes[2]);
if(d.getDay()===0){
showToast("Hoje estamos fechados");
return;
}

let mensagem=`🍣 *RESERVA DE MESA*

👤 Nome: ${nome} ${sobrenome}
📅 Data: ${data}
⏰ Horário: ${hora}
🏠 Área: ${ambiente}
👥 Pessoas: ${pessoas}
📞 Telefone: ${telefone}`;

if(obs){
mensagem+=`\n\n📝 Observações: ${obs}`;
}

const url=`https://api.whatsapp.com/send?phone=551634423799&text=${encodeURIComponent(mensagem)}`;

showToast("Abrindo WhatsApp...");

setTimeout(()=>{
window.open(url,"_blank");
limpar();
},800);
}

function limpar(){
["nome","sobrenome","data","hora","ambiente","pessoas","telefone","obs"]
.forEach(id=>document.getElementById(id).value="")
}

function showToast(msg){
const t=document.getElementById("toast");
t.innerText=msg;
t.classList.add("show");
setTimeout(()=>t.classList.remove("show"),3000);
}
</script>

</body>
</html>
